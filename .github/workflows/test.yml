name: Tests

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Install xcpretty
        run: gem install xcpretty --no-document

      - name: Show available simulators
        run: xcrun simctl list devices available | grep -E "iPhone [0-9]"

      - name: Run unit tests
        run: |
          set -o pipefail
          SIM=$(xcrun simctl list devices available | grep -E "iPhone [0-9]" | head -1 | sed 's/.*(\(.*\)) .*/\1/')
          echo "Using simulator: $SIM"
          xcodebuild test \
            -project OccamsRunner.xcodeproj \
            -scheme OccamsRunner \
            -destination "platform=iOS Simulator,id=$SIM" \
            -only-testing OccamsRunnerTests \
            -resultBundlePath TestResults/UnitTests.xcresult \
            | xcpretty

      - name: Upload unit test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: TestResults/UnitTests.xcresult

  ui-tests:
    name: UI Tests
    runs-on: macos-15
    needs: unit-tests  # Only run UI tests if unit tests pass

    steps:
      - uses: actions/checkout@v4

      - name: Install xcpretty
        run: gem install xcpretty --no-document

      - name: Run UI tests
        run: |
          set -o pipefail
          SIM=$(xcrun simctl list devices available | grep -E "iPhone [0-9]" | head -1 | sed 's/.*(\(.*\)) .*/\1/')
          echo "Using simulator: $SIM"
          xcodebuild test \
            -project OccamsRunner.xcodeproj \
            -scheme OccamsRunner \
            -destination "platform=iOS Simulator,id=$SIM" \
            -only-testing OccamsRunnerUITests \
            -resultBundlePath TestResults/UITests.xcresult \
            | xcpretty

      - name: Upload UI test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ui-test-results
          path: TestResults/UITests.xcresult
